version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    env_file:
      - .env

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/data.sql:/docker-entrypoint-initdb.d/02_data.sql
      - ./sql/esquema.sql:/docker-entrypoint-initdb.d/01_esquema.sql

volumes:
  postgres_data:
